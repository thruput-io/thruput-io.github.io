<!DOCTYPE html>
<html lang='{{ site.lang | default: "en-US" }}'>
  <head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="stylesheet" type="text/css" href="{{ '/assets/css/print.css' | relative_url }}" media="print">
    <!--[if lt IE 9]>
    <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <!-- Thruput brand fonts (Nordic Monochrome) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

{% seo %}
    {% include head-custom.html %}
  </head>

  <body>
  <!--
    <nav class="site-nav-bar">
      <a href="{{ '/' | relative_url }}" class="nav-logo">thruput<span>.</span></a>
      <div class="nav-links">
        <a class="nav-link" href="{{ '/' | relative_url }}">home</a>
        <a class="nav-link" href="{{ '/thruput-graphic-profile.html' | relative_url }}">graphic profile</a>
      </div>
    </nav>
    -->

    {% if page.url == "/" %}
    <section class="hero">
      <div class="hero-content">
        <h1 class="wordmark">thruput<span>.</span></h1>
        <div class="hero-tagline">{{ site.description }}</div>
        <a class="btn-cta" href="mailto:{{ site.email | default: 'info@thruput.se' }}">contact us</a>
      </div>
    </section>
    {% endif %}

    <div id="container">
      <div class="inner">
        <section id="main_content">
          {{ content }}
        </section>
      </div>
    </div>

    <footer class="site-footer is-dark">
      <div class="inner">
        <div class="footer-wordmark">thruput<span>.</span></div>
        <p>&copy; {{ site.time | date: "%Y" }} Thruput AB. Stockholm, SE</p>
      </div>
    </footer>
  </body>
</html>

<!DOCTYPE html>
<html lang='{{ site.lang | default: "en-US" }}'>
  <head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <link rel="stylesheet" type="text/css" href="{{ '/assets/css/print.css' | relative_url }}" media="print">
    <!--[if lt IE 9]>
    <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <!-- Thruput brand fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

{% seo %}
    {% include head-custom.html %}
  </head>

  <body>
    {% if page.url == "/" %}
    <section class="hero">
      <div class="hero-content">
        <h1 class="wordmark">{{ site.title }}</h1>
        <p class="tagline">{{ site.description }}</p>
      </div>
    </section>
    {% endif %}

    <!--
    <header class="site-header">
      <a href="{{ '/' | relative_url }}" class="wordmark">{{ site.title }}</a>
      <nav class="site-nav">
        <a class="nav-link" href="{{ '/' | relative_url }}">Home</a>
        <a class="nav-link" href="{{ '/thruput-graphic-profile.html' | relative_url }}">Graphic Profile</a>
      </nav>
    </header>
    -->

    <div id="container">
      <div class="inner">
        <section id="main_content">
          {{ content }}
        </section>
      </div>
    </div>

    <footer class="site-footer">
      <div class="inner">
        <h2 class="wordmark" style="color: white; font-size: 2rem; margin-bottom: 1rem;">{{ site.title }}</h2>
        <p>{{ site.description }}</p>
        <p>&copy; {{ site.time | date: "%Y" }} Thruput. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
